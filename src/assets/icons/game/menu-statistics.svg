<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="barOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdab41"/>
      <stop offset="100%" stop-color="#f27013"/>
    </linearGradient>
    <linearGradient id="barWhite" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#b8bcc2"/>
    </linearGradient>
  </defs>

  <!-- Bar 1 (short) -->
  <rect x="12" y="54" width="20" height="36" rx="5" fill="url(#barWhite)" stroke="#23282d" stroke-width="5"/>

  <!-- Bar 2 (tall) -->
  <rect x="40" y="14" width="20" height="76" rx="5" fill="url(#barOrange)" stroke="#23282d" stroke-width="5"/>

  <!-- Bar 3 (medium) -->
  <rect x="68" y="34" width="20" height="56" rx="5" fill="url(#barWhite)" stroke="#23282d" stroke-width="5"/>
</svg>
