<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="256" height="256">
  <defs>
    <linearGradient id="gearBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdab41"/>
      <stop offset="100%" stop-color="#f27013"/>
    </linearGradient>
    <linearGradient id="gearFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#d1d1d1"/>
    </linearGradient>
    <g id="gear-shape">
      <circle cx="50" cy="50" r="23" />
      <rect x="42" y="15" width="16" height="70" rx="3" ry="3" />
      <rect x="42" y="15" width="16" height="70" rx="3" ry="3" transform="rotate(45 50 50)" />
      <rect x="42" y="15" width="16" height="70" rx="3" ry="3" transform="rotate(90 50 50)" />
      <rect x="42" y="15" width="16" height="70" rx="3" ry="3" transform="rotate(135 50 50)" />
    </g>
    <mask id="hole-mask">
      <rect width="100" height="100" fill="white" />
      <circle cx="50" cy="50" r="14" fill="black" />
    </mask>
  </defs>

  <rect x="4" y="4" width="92" height="92" rx="22" ry="22" fill="url(#gearBg)" stroke="#23282d" stroke-width="4" />

  <g mask="url(#hole-mask)">
    <use href="#gear-shape" fill="#23282d" stroke="#23282d" stroke-width="8" stroke-linejoin="round" />
    <use href="#gear-shape" fill="url(#gearFill)" />
  </g>

  <circle cx="50" cy="50" r="14" fill="none" stroke="#23282d" stroke-width="4" />
</svg>